name: work flow
on: [ push ]
jobs:
  build_push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          cache: 'maven'
          java-version: '17'
          distribution: 'temurin'
      - name: mvn package
        run: mvn -B package

      - name: docker build
        run: docker build . --file Dockerfile --tag meowpick-app:1.0
      - name: run
        run: docker-compose down && docker-compose up -d && docker ps

      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}

