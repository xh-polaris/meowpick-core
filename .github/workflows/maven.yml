name: work flow
on: [ push ]
jobs:
  build_push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: build
        run: mvn  -B package

      - name: docker build
        run: docker build . --file Dockerfile --tag meowpick-app:1.0

      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}

